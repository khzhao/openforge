<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 340" role="img" aria-labelledby="title desc">
  <title id="title">OpenForge logo</title>
  <desc id="desc">A centered OpenForge logo with a forged shield mark and bronze-accent wordmark.</desc>
  <defs>
    <linearGradient id="panel" x1="20" y1="20" x2="1380" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#121925"/>
      <stop offset="1" stop-color="#1b2634"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="40" y1="26" x2="1360" y2="314" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2d3a4d"/>
      <stop offset="1" stop-color="#465366"/>
    </linearGradient>
    <linearGradient id="shield" x1="72" y1="26" x2="190" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#192434"/>
      <stop offset="1" stop-color="#101821"/>
    </linearGradient>
    <linearGradient id="forgeAccent" x1="88" y1="76" x2="182" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e7c27a"/>
      <stop offset="0.58" stop-color="#c99248"/>
      <stop offset="1" stop-color="#9f6429"/>
    </linearGradient>
    <linearGradient id="steel" x1="98" y1="72" x2="154" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#faf7f0"/>
      <stop offset="0.6" stop-color="#dde3ea"/>
      <stop offset="1" stop-color="#b4bec9"/>
    </linearGradient>
    <linearGradient id="wordAccent" x1="760" y1="96" x2="1044" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e7c27a"/>
      <stop offset="0.58" stop-color="#c99248"/>
      <stop offset="1" stop-color="#9f6429"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-15%" width="130%" height="145%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0a1018" flood-opacity="0.24"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="20" y="20" width="1360" height="300" rx="34" fill="url(#panel)" stroke="url(#panelStroke)" stroke-width="4"/>
  </g>

  <g transform="translate(210 42)">
    <g>
      <path
        d="M118 18 204 68v120l-86 50-86-50V68l86-50Z"
        fill="url(#shield)"
        stroke="#334257"
        stroke-width="7"
        stroke-linejoin="round"
      />
      <path
        d="M118 44 178 79v98l-60 35-60-35V79l60-35Z"
        fill="#0e1622"
        stroke="#223042"
        stroke-width="3"
        stroke-linejoin="round"
      />
      <path
        d="M90 72h78l-14 20h-31v18h27l-14 20h-13v50H90V72Z"
        fill="url(#steel)"
      />
      <path
        d="M90 72h78l-14 20H78z"
        fill="url(#forgeAccent)"
      />
      <path
        d="M118 30 76 54v62"
        fill="none"
        stroke="#ffffff"
        stroke-opacity="0.08"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </g>

    <g transform="translate(310 0)" font-family="DejaVu Sans, Arial, sans-serif">
      <text x="0" y="164" font-size="112" font-weight="900" letter-spacing="-1" fill="#f6f1e8">
        <tspan>Open</tspan><tspan dx="14" fill="url(#wordAccent)">Forge</tspan>
      </text>
      <rect x="4" y="198" width="232" height="6" rx="3" fill="url(#wordAccent)"/>
    </g>
  </g>
</svg>
