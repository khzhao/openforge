<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">OpenForge mark</title>
  <desc id="desc">A refined OpenForge mark with a forged shield and bronze-accent monogram.</desc>
  <defs>
    <linearGradient id="shield" x1="72" y1="26" x2="190" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#192434"/>
      <stop offset="1" stop-color="#101821"/>
    </linearGradient>
    <linearGradient id="forgeAccent" x1="88" y1="76" x2="182" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e7c27a"/>
      <stop offset="0.58" stop-color="#c99248"/>
      <stop offset="1" stop-color="#9f6429"/>
    </linearGradient>
    <linearGradient id="steel" x1="98" y1="72" x2="154" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#faf7f0"/>
      <stop offset="0.6" stop-color="#dde3ea"/>
      <stop offset="1" stop-color="#b4bec9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0a1018" flood-opacity="0.24"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <path
      d="M128 18 214 68v120l-86 50-86-50V68l86-50Z"
      fill="url(#shield)"
      stroke="#334257"
      stroke-width="7"
      stroke-linejoin="round"
    />
    <path
      d="M128 44 188 79v98l-60 35-60-35V79l60-35Z"
      fill="#0e1622"
      stroke="#223042"
      stroke-width="3"
      stroke-linejoin="round"
    />
    <path
      d="M100 72h78l-14 20h-31v18h27l-14 20h-13v50h-33V72Z"
      fill="url(#steel)"
    />
    <path
      d="M100 72h78l-14 20H88z"
      fill="url(#forgeAccent)"
    />
    <path
      d="M128 30 86 54v62"
      fill="none"
      stroke="#ffffff"
      stroke-opacity="0.08"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>
