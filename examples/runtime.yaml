# User-facing runtime/session config.
# This is the runtime payload embedded inside POST /start_session.

algo:
  kl_coef: 0.0

model:
  model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  tokenizer_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  reference_model_name_or_path: null
  attn_implementation: sdpa

train:
  backend: fsdp2
  config:
    gradient_checkpointing: false
    reshard_after_forward: false
    mixed_precision:
      param_dtype: bfloat16
      reduce_dtype: float32
    offload:
      mode: none
      pin_memory: false
    amp:
      enabled: true
      precision: bfloat16
      use_grad_scaler: false
    optim:
      lr: 5.0e-6
      adam_beta1: 0.9
      adam_beta2: 0.95
      adam_eps: 1.0e-8
      weight_decay: 0.0
      max_grad_norm: 1.0
    scheduler:
      type: constant
      warmup_steps: 0
      min_lr: 0.0
      num_cycles: 0.5
      min_lr_rate: null
  global_batch_size: 64
  mini_batch_size: 16
  micro_batch_size: 4
  checkpoints: ./checkpoints
  cpus_per_worker: 1
  parallel:
    data_parallel_size: 1
    fsdp_parallel_size: 1
    pipeline_parallel_size: 1
    tensor_parallel_size: 1
    context_parallel_size: 1
    expert_parallel_size: 1

rollout:
  backend: sglang
  request:
    temperature: 1.0
    top_p: 1.0
    top_k: 0
    max_new_tokens: 256
    stop: []
    stop_token_ids: []
    skip_special_tokens: true
    no_stop_trim: false
    spaces_between_words: true
  engine_groups:
    - name: regular
      worker_type: regular
      replicas: 1
      num_gpus_per_replica: 1
      num_cpus_per_replica: 0
      parallelism:
        data_parallel_size: 1
        fsdp_parallel_size: 1
        pipeline_parallel_size: 1
        tensor_parallel_size: 1
        context_parallel_size: 1
        expert_parallel_size: 1
      enable_memory_saver: false
      sglang_server_overrides: {}
